name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      # Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🔥 IMPORTANT: Ensure iOS folder exists
      - name: Ensure iOS platform
        run: flutter create .

      # Install CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # Build iOS (no signing)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # Create Payload folder
      - name: Create Payload folder
        run: mkdir -p Payload
        working-directory: build/ios/iphoneos

      # Move .app into Payload
      - name: Move app to Payload
        run: mv Runner.app Payload/
        working-directory: build/ios/iphoneos

      # Zip into IPA
      - name: Create IPA
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      # Upload IPA as artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa

      # Optional: Upload to GitHub Release
      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
